name: Sync iOS Shortcuts Data

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Fetch and Transform Data
        run: |
          # Download mit User-Agent
          curl -H "User-Agent: Mozilla/5.0" -L -s https://raw.githubusercontent.com > raw_data.json
          
          python3 << 'EOF'
          import json
          import sys

          def extract_first_json_array():
              try:
                  with open('raw_data.json', 'r', encoding='utf-8') as f:
                      content = f.read().strip()
                  
                  # Wir finden den Anfang des ersten Arrays
                  start = content.find('[')
                  if start == -1:
                      raise ValueError("Kein '[' gefunden.")
                  
                  # Wir tasten uns Klammer für Klammer vor, bis das erste Array schließt
                  count = 0
                  end = -1
                  for i in range(start, len(content)):
                      if content[i] == '[':
                          count += 1
                      elif content[i] == ']':
                          count -= 1
                          if count == 0:
                              end = i + 1
                              break
                  
                  if end == -1:
                      raise ValueError("Kein schließendes ']' gefunden.")
                  
                  # Nur diesen exakten Teil extrahieren
                  clean_json = content[start:end]
                  return json.loads(clean_json)
              except Exception as e:
                  print(f"Detail-Fehler: {e}")
                  return None

          data = extract_first_json_array()

          if data and isinstance(data, list):
              transformed = []
              for item in data:
                  if isinstance(item, dict):
                      name = item.get('title') or item.get('name') or 'Unbekannt'
                      url = item.get('url', '')
                      if 'prefs:' in url:
                          final_url = url if 'App-prefs:' in url else url.replace('prefs:', 'App-prefs:')
                          transformed.append({
                              "name": name,
                              "urlScheme": final_url,
                              "category": "System",
                              "iconName": "gearshape.fill",
                              "description": f"Direktzugriff auf {name}",
                              "keywords": [name.lower(), "ios", "einstellungen"]
                          })
              
              with open('ecehub_master.json', 'w', encoding='utf-8') as f:
                  json.dump(transformed, f, indent=2, ensure_ascii=False)
              print(f"ERFOLG: {len(transformed)} Einträge gespeichert.")
          else:
              print("FEHLER: Konnte kein valides Array extrahieren.")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name 'ECEHub-Bot'
          git config --global user.email 'bot@ecehub.app'
          git add ecehub_master.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Update iOS Data" && git push)
