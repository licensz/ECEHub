name: Sync iOS Shortcuts Data

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Fetch and Transform Data
        run: |
          # Download mit User-Agent
          curl -H "User-Agent: Mozilla/5.0" -L -s https://raw.githubusercontent.com > raw_data.json
          
          python3 << 'EOF'
          import json
          import sys
          import re

          try:
              with open('raw_data.json', 'r', encoding='utf-8') as f:
                  content = f.read().strip()
              
              # TRICK: Wir suchen den Index der ERSTEN '[' und der LETZTEN ']'
              start_index = content.find('[')
              end_index = content.rfind(']')
              
              if start_index == -1 or end_index == -1:
                  raise ValueError("Kein JSON-Array (Klammern [ ]) in der Datei gefunden.")
              
              # Wir schneiden ALLES vor dem ersten [ und nach dem letzten ] weg
              clean_json_str = content[start_index:end_index+1]
              
              # Jetzt laden wir das bereinigte JSON
              data = json.loads(clean_json_str)
              
              transformed = []
              if isinstance(data, list):
                  for item in data:
                      if isinstance(item, dict):
                          name = item.get('title') or item.get('name') or 'Unbekannt'
                          url = item.get('url', '')
                          if 'prefs:' in url:
                              # Vereinheitlichung auf App-prefs:
                              final_url = url if 'App-prefs:' in url else url.replace('prefs:', 'App-prefs:')
                              transformed.append({
                                  "name": name,
                                  "urlScheme": final_url,
                                  "category": "System",
                                  "iconName": "gearshape.fill",
                                  "description": f"Direktzugriff auf {name}",
                                  "keywords": [name.lower(), "ios", "einstellungen"]
                              })
              
              # Speichern der bereinigten Datei
              with open('ecehub_master.json', 'w', encoding='utf-8') as f:
                  json.dump(transformed, f, indent=2, ensure_ascii=False)
              
              print(f"ERFOLG: {len(transformed)} Einträge in ecehub_master.json gespeichert.")

          except Exception as e:
              print(f"FEHLER BEIM PARSING: {e}")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name 'ECEHub-Bot'
          git config --global user.email 'bot@ecehub.app'
          git add ecehub_master.json
          # Nur pushen, wenn sich wirklich etwas geändert hat
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Update iOS Data" && git push)
