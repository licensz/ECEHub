name: Sync iOS Shortcuts Data

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Fetch and Transform Data
        run: |
          # 1. Download mit User-Agent (verhindert Blockaden durch GitHub)
          curl -H "User-Agent: Mozilla/5.0" -L -s https://raw.githubusercontent.com > raw_data.json
          
          # 2. Prüfen ob Datei existiert und nicht leer ist
          if [ ! -s raw_data.json ]; then
            echo "Fehler: Download fehlgeschlagen oder Datei leer."
            exit 1
          fi

          python3 -c "
          import json, sys
          try:
              with open('raw_data.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
              
              # Wesley nutzt oft ein Dictionary mit 'settings' Key
              items = data if isinstance(data, list) else data.get('settings', [])
              
              transformed = []
              for item in items:
                  name = item.get('title') or item.get('name') or 'Unbekannt'
                  url = item.get('url', '')
                  
                  if url.startswith('App-prefs:') or url.startswith('prefs:'):
                      final_url = url if url.startswith('App-prefs:') else url.replace('prefs:', 'App-prefs:')
                      transformed.append({
                          'name': name,
                          'urlScheme': final_url,
                          'category': 'System',
                          'iconName': 'gearshape.fill',
                          'description': f'Direktzugriff auf {name}',
                          'keywords': [name.lower(), 'ios', 'einstellungen']
                      })
              
              # Nur speichern, wenn wir wirklich Daten haben
              if len(transformed) > 0:
                  with open('ecehub_master.json', 'w', encoding='utf-8') as f:
                      json.dump(transformed, f, indent=2, ensure_ascii=False)
                  print(f'Erfolg: {len(transformed)} Einträge gespeichert.')
              else:
                  print('Fehler: Keine passenden URLs gefunden.')
                  sys.exit(1)
          except Exception as e:
              print(f'Python-Fehler: {e}')
              sys.exit(1)
          "

      - name: Commit and Push
        run: |
          git config --global user.name 'ECEHub-Bot'
          git config --global user.email 'bot@ecehub.app'
          git add ecehub_master.json
          git diff --quiet && git diff --staged --quiet || (git commit -m \"Auto-Update iOS Data\" && git push)
