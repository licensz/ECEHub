          python3 -c "
          import json, sys, re
          try:
              with open('raw_data.json', 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # Wir suchen den ersten '[' und den letzten ']', um nur das JSON-Array zu extrahieren
              match = re.search(r'\[.*\]', content, re.DOTALL)
              if not match:
                  raise ValueError('Kein gültiges JSON-Array in der Datei gefunden.')
              
              data = json.loads(match.group())
              
              transformed = []
              for item in data:
                  if not isinstance(item, dict): continue
                  name = item.get('title') or item.get('name') or 'Unbekannt'
                  url = item.get('url', '')
                  
                  # Wir filtern nur die echten Einstellungen-Links
                  if 'prefs:' in url:
                      # Vereinheitlichung auf App-prefs:
                      final_url = url if 'App-prefs:' in url else url.replace('prefs:', 'App-prefs:')
                      transformed.append({
                          'name': name,
                          'urlScheme': final_url,
                          'category': 'System',
                          'iconName': 'gearshape.fill',
                          'description': f'Direktzugriff auf {name}',
                          'keywords': [name.lower(), 'einstellungen', 'ios']
                      })
              
              if len(transformed) > 0:
                  with open('ecehub_master.json', 'w', encoding='utf-8') as f:
                      json.dump(transformed, f, indent=2, ensure_ascii=False)
                  print(f'Erfolg: {len(transformed)} Einträge extrahiert.')
              else:
                  sys.exit('Keine passenden URLs gefunden.')
          except Exception as e:
              print(f'Fehler: {e}')
              sys.exit(1)
          "
