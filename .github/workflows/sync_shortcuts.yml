name: Sync iOS Shortcuts Data

on:
  schedule:
    - cron: '0 0 * * 0' # Läuft jeden Sonntag um 00:00 Uhr
  workflow_dispatch: # Erlaubt manuelles Starten zum Testen

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
            - name: Fetch and Transform Data
        run: |
          # Download der Rohdaten
          curl -s https://raw.githubusercontent.com > raw_data.json
          
          python3 -c "
          import json, os
          try:
              with open('raw_data.json', 'r', encoding='utf-8') as f:
                  content = f.read()
                  if not content:
                      raise ValueError('Die heruntergeladene Datei ist leer.')
                  data = json.loads(content)
              
              # Falls Wesley ein Dictionary mit einem Key wie 'settings' nutzt:
              if isinstance(data, dict):
                  # Wir suchen nach der Liste im Dictionary, falls vorhanden
                  data = data.get('settings', list(data.values())[0] if data.values() else [])
              
              transformed = []
              for item in data:
                  if not isinstance(item, dict): continue
                  
                  name = item.get('title') or item.get('name') or 'Unbekannt'
                  url = item.get('url') or ''
                  
                  # Wir nehmen nur valide iOS-Pfade
                  if url.startswith('App-prefs:') or url.startswith('prefs:'):
                      transformed.append({
                          'name': name,
                          'urlScheme': url.replace('prefs:', 'App-prefs:'), # Vereinheitlichen
                          'category': 'System',
                          'iconName': 'gearshape.fill',
                          'description': f'Direktzugriff auf {name}',
                          'keywords': [name.lower(), 'einstellungen', 'setup']
                      })
              
              if not transformed:
                  print('Warnung: Keine passenden Shortcuts gefunden.')
              
              with open('ecehub_master.json', 'w', encoding='utf-8') as f:
                  json.dump(transformed, f, indent=2, ensure_ascii=False)
              print(f'Erfolg: {len(transformed)} Shortcuts verarbeitet.')
              
          except Exception as e:
              print(f'KRITISCHER FEHLER: {e}')
              exit(1)
          "
      - name: Commit and Push changes
        run: |
          git config --global user.name 'ECEHub-Bot'
          git config --global user.email 'bot@ecehub.app'
          git add ecehub_master.json
          git commit -m "Automatisches Update der iOS-Pfade" || exit 0
          git push
